name: weekend-hot-news
on:
  schedule:
    - cron: '30 1 * * 6,0'    # 8:30 VN thứ 7 & CN — chỉ quét tin nóng
  workflow_dispatch: {}
permissions: { contents: write }
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: Quét tin — chỉ nhắn nếu TRỌNG YẾU
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd pipeline && python fetch_policy.py && python - << 'PY'
          from utils import load_json, data_path
          from telegram_send import send
          p = load_json(data_path("policy-latest.json"), {})
          nong = [t for t in p.get("tin_lien_quan", []) if t.get("muc_do") == "trong-yeu"]
          if nong:
              msg = "🔥 TIN NÓNG CUỐI TUẦN (chuẩn bị phiên tới, KHÔNG phát tín hiệu mới):\n"
              msg += "\n".join(f"• {t['tieu_de'][:90]}" for t in nong[:5])
              send(msg)
          else:
              print("Không có tin trọng yếu — im lặng đúng thiết kế")
          PY
