name: app-build

# Tự build app/ (Vite+React) rồi PUSH thẳng sang repo Pages riêng
# dondatcto-collab/policy-radar-app (nhánh main) — không còn commit app/dist/ vào
# repo này. Pages phục vụ tại https://dondatcto-collab.github.io/policy-radar-app/.
# Cần secret APP_DEPLOY_TOKEN (PAT có quyền Contents write vào repo policy-radar-app).
# Không đụng 3 workflow pipeline evening/morning/weekend.yml.
on:
  push:
    branches: [main]
    paths:
      - "app/src/**"
      - "app/package.json"
      - "app/package-lock.json"
      - "app/vite.config.js"
      - "app/index.html"

permissions:
  contents: read

concurrency:
  group: app-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Cài dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run build

      - name: Clone repo policy-radar-app vào thư mục tạm
        run: |
          git clone --depth 1 "https://x-access-token:${{ secrets.APP_DEPLOY_TOKEN }}@github.com/dondatcto-collab/policy-radar-app.git" "$RUNNER_TEMP/deploy-target"

      - name: Copy app/dist vào thư mục gốc repo đích
        run: |
          rsync -a --delete --exclude=".git" app/dist/ "$RUNNER_TEMP/deploy-target/"

      - name: Commit và push sang policy-radar-app
        run: |
          cd "$RUNNER_TEMP/deploy-target"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B main
          git add -A
          if git diff --cached --quiet; then
            echo "Không có thay đổi — bỏ qua commit"
          else
            git commit -m "build: cập nhật từ policy-radar app/ ($(date -u +%F))"
            git push origin main
          fi
