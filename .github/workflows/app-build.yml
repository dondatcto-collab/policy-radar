name: app-build

# Tự build app/ (Vite+React) và commit thẳng output tĩnh vào app/dist/ để GitHub
# Pages (source: main /(root), không đổi) phục vụ tại .../policy-radar/app/dist/.
# Không đụng 3 workflow pipeline evening/morning/weekend.yml.
on:
  push:
    branches: [main]
    paths:
      - "app/src/**"
      - "app/package.json"
      - "app/package-lock.json"
      - "app/vite.config.js"
      - "app/index.html"

permissions:
  contents: write

concurrency:
  group: app-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Cài dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run build

      - name: Commit app/dist nếu có thay đổi
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/dist
          if git diff --cached --quiet; then
            echo "app/dist không đổi — bỏ qua commit"
          else
            git commit -m "build: cập nhật app/dist [skip ci]"
            git push
          fi
