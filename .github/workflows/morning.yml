name: morning-report
on:
  schedule:
    - cron: '0 0 * * 1-5'     # 7:00 VN thứ 2–6 (0:00 UTC cùng ngày)
  workflow_dispatch: {}
permissions: { contents: write }
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: Quét chính sách + sinh báo cáo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd pipeline && python fetch_policy.py && python report.py
      - name: Gửi Telegram 8:00
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: cd pipeline && python telegram_send.py
      - name: Commit data
        run: |
          git config user.name radar-bot && git config user.email bot@radar
          git add data/ && git commit -m "report $(date +%F)" || echo "no changes"
          git push
      - name: Báo lỗi nếu fail
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd pipeline && python -c "from telegram_send import send; send('🔴 LỖI cron sáng — không có báo cáo hôm nay, kiểm tra Actions')"
