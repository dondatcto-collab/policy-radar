name: morning-report
on:
  schedule:
    # 6:37 VN thứ 2–6 = 23:37 UTC ngày hôm TRƯỚC (tránh giờ cao điểm 0:00 UTC của
    # GitHub Actions, hay bị trễ 15-30 phút). Ngày cron 0-4 = CN,T2,T3,T4,T5 (UTC)
    # ứng với sáng T2,T3,T4,T5,T6 (VN, +7h). Không cần sửa code ngày: now_vn()/
    # today_str() trong utils.py dùng datetime.now(VN_TZ) — luôn ra đúng NGÀY VN
    # theo thời điểm chạy thật (UTC), bất kể cron nổ trước hay sau nửa đêm UTC.
    - cron: '37 23 * * 0-4'
  workflow_dispatch: {}
permissions: { contents: write }
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: Quét chính sách + sinh báo cáo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd pipeline && python fetch_policy.py && python report.py
      - name: Gửi Telegram 8:00
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: cd pipeline && python telegram_send.py
      - name: Commit data
        run: |
          git config user.name radar-bot && git config user.email bot@radar
          git add data/ && git commit -m "report $(date +%F)" || echo "no changes"
          git push
      - name: Báo lỗi nếu fail
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd pipeline && python -c "from telegram_send import send; send('🔴 LỖI cron sáng — không có báo cáo hôm nay, kiểm tra Actions')"
      - name: Sinh nhiệm vụ đánh giá cho app (feedback/pending-tasks.json)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd pipeline
          python gen_pending_tasks.py || { python -c "from telegram_send import send; send('⚠️ Lỗi sinh feedback/pending-tasks.json — kiểm tra Actions')"; exit 1; }
          cd ..
          git config user.name radar-bot && git config user.email bot@radar
          git add feedback/pending-tasks.json
          git commit -m "tasks: pending-tasks $(date +%F)" || echo "no changes"
          git push
